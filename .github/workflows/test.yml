name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Ensure dist is up to date
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "dist/ is not up to date. Run: npm run build && commit"
            git diff dist
            exit 1
          fi

  self-test-valid:
    name: Self-test (valid fixtures should pass)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          config-path: 'test/fixtures/valid.json'

  self-test-broken:
    name: Self-test (broken fixtures should fail)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Run action on broken fixture, expect failure
        id: run_action
        continue-on-error: true
        uses: ./
        with:
          config-path: 'test/fixtures/broken.json'
      - name: Assert action failed
        run: |
          if [ "${{ steps.run_action.outcome }}" != "failure" ]; then
            echo "Expected action to fail on broken fixture, but it succeeded."
            exit 1
          fi
          echo "✓ Action correctly exited with failure on broken fixture"
