name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Ensure dist is up to date
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "dist/ is not up to date. Run: npm run build && commit"
            git diff dist
            exit 1
          fi

  self-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          config-path: 'test/fixtures/**/*.json'
